<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MONSTERTAMA</title>
<style>
  :root {
    --shell:        #2a2a2c;
    --shell-light:  #3a3a3d;
    --shell-dark:   #18181a;
    --shell-rim:    #0d0d0e;
    --bezel:        #0a0a0b;
    --lcd-bg:       #6e8a32;
    --lcd-bg-dark:  #4f6b1c;
    --lcd-ink:      #0d1606;
    --lcd-glow:     #c2e36a;
    --btn:          #1f1f21;
    --btn-shine:    #4a4a4e;
    --accent:       #b03030;
    --text:         #c8c8c0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background:
      radial-gradient(ellipse at center, #1a1a1c 0%, #050506 80%),
      #000;
    color: var(--text);
    font-family: 'Courier New', ui-monospace, monospace;
    overflow-x: hidden;
    -webkit-font-smoothing: none;
    font-smooth: never;
  }

  /* film grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 16px;
  }

  /* ------------ TAMAGOTCHI DEVICE ------------ */
  .device {
    position: relative;
    width: 360px;
    aspect-ratio: 360 / 460;
    background:
      radial-gradient(ellipse at 30% 20%, var(--shell-light), var(--shell) 45%, var(--shell-dark) 100%);
    border-radius: 50% 50% 45% 45% / 38% 38% 50% 50%;
    box-shadow:
      inset 0 -14px 30px rgba(0,0,0,0.6),
      inset 0 8px 14px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.7),
      0 0 0 4px var(--shell-rim);
    padding: 64px 40px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* a bit of texture on shell */
  .device::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.015) 0 1px,
        transparent 1px 4px
      );
    pointer-events: none;
  }

  /* speaker holes top */
  .speaker {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
  }
  .speaker span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--shell-dark);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
  }

  .brand {
    position: absolute;
    top: 44px;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(200,200,192,0.35);
    font-weight: bold;
  }

  /* ------------ LCD SCREEN ------------ */
  .screen-frame {
    width: 100%;
    aspect-ratio: 1.15 / 1;
    background: var(--bezel);
    border-radius: 18px;
    padding: 14px;
    box-shadow:
      inset 0 4px 10px rgba(0,0,0,0.9),
      inset 0 -2px 4px rgba(255,255,255,0.04),
      0 2px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  .screen {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 30% 25%, var(--lcd-bg) 0%, var(--lcd-bg-dark) 75%, #3a4f10 100%);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 30px rgba(0,0,0,0.35),
      inset 0 0 60px rgba(0,0,0,0.2);
  }

  /* scanlines */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0 1px,
        transparent 1px 3px
      );
    pointer-events: none;
    z-index: 3;
  }

  /* LCD pixel grid */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 4px 4px;
    pointer-events: none;
    z-index: 2;
  }

  /* backlight flicker */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    96% { opacity: 1; }
    97% { opacity: 0.92; }
    98% { opacity: 1; }
  }
  .screen { animation: flicker 7s infinite; }

  /* sprite canvas */
  #spriteCanvas {
    --char-scale: 1;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--char-scale));
    width: 81%;
    height: 81%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    z-index: 4;  /* über scanlines (3) und pixelgrid (2) damit outlines sauber bleiben */
    filter: drop-shadow(0 0 1px rgba(13,22,6,0.4));
  }

  /* idle bob */
  @keyframes bob {
    0%, 100% { transform: translate(-50%, -50%) scale(var(--char-scale)); }
    50%      { transform: translate(-50%, calc(-50% - 6px)) scale(var(--char-scale)); }
  }
  #spriteCanvas.animated { animation: bob 2.4s ease-in-out infinite; }

  /* status text on LCD */
  .lcd-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--lcd-ink);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    text-shadow: 0 0 2px rgba(13,22,6,0.4);
    z-index: 4;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .lcd-text.top    { top: 10px;    font-size: 10px; }
  .lcd-text.bottom { bottom: 10px; font-size: 11px; }

  /* code entry overlay on LCD */
  .code-pad {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 5;
    color: var(--lcd-ink);
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }
  .code-pad .label {
    font-size: 10px;
    letter-spacing: 0.2em;
  }
  .code-pad .digits {
    display: flex;
    gap: 8px;
    font-size: 22px;
    letter-spacing: 0.15em;
  }
  .code-pad .digit {
    width: 22px;
    text-align: center;
    border-bottom: 2px solid var(--lcd-ink);
    padding-bottom: 2px;
  }
  .code-pad .hint {
    font-size: 8px;
    letter-spacing: 0.15em;
    opacity: 0.7;
    margin-top: 4px;
  }
  .code-pad.error .digits { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* hidden input - fängt tastatur-eingaben und triggert mobile keyboard */
  #codeInput {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px; /* >=16px verhindert auto-zoom auf iOS */
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    z-index: 6;
  }

  /* cursor blink auf aktiver ziffer */
  @keyframes blink {
    0%, 50%   { opacity: 1; }
    51%, 100% { opacity: 0.3; }
  }
  .code-pad .digit.cursor {
    animation: blink 1s infinite;
  }

  /* ------------ BUTTONS ------------ */
  .controls {
    margin-top: 28px;
    display: flex;
    gap: 26px;
    align-items: center;
    justify-content: center;
  }
  .btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background:
      radial-gradient(circle at 35% 30%, var(--btn-shine), var(--btn) 65%, #000 100%);
    box-shadow:
      inset 0 -3px 5px rgba(0,0,0,0.6),
      inset 0 2px 3px rgba(255,255,255,0.15),
      0 3px 6px rgba(0,0,0,0.5),
      0 0 0 2px rgba(0,0,0,0.4);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    display: grid;
    place-items: center;
  }
  .btn:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 -1px 2px rgba(0,0,0,0.6),
      inset 0 2px 4px rgba(0,0,0,0.4),
      0 1px 2px rgba(0,0,0,0.5),
      0 0 0 2px rgba(0,0,0,0.4);
  }
  .btn .glyph {
    width: 14px;
    height: 14px;
    fill: var(--text);
  }
  .btn-label {
    position: absolute;
    margin-top: 56px;
    font-size: 7px;
    letter-spacing: 0.2em;
    color: rgba(200,200,192,0.4);
    pointer-events: none;
  }
  .btn-wrap {
    position: relative;
    display: grid;
    place-items: center;
  }

  /* ------------ STRAP HOLE ------------ */
  .strap {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 14px;
    background: var(--shell-rim);
    border-radius: 0 0 12px 12px;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.6);
  }
  .strap::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 4px;
    background: #000;
    border-radius: 4px;
  }

  /* ------------ ROSTER (hidden by default, opens via MENU) ------------ */
  .roster {
    position: fixed;
    inset: 0;
    background: rgba(5,5,7,0.92);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 100;
    place-items: center;
    padding: 24px;
  }
  .roster.open { display: grid; }
  .roster-inner {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(180deg, #1a1a1c, #0d0d0e);
    border: 1px solid #2a2a2c;
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  }
  .roster h2 {
    margin: 0 0 14px;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--text);
    text-align: center;
  }
  .roster-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .char-card {
    background: #0a0a0b;
    border: 1px solid #1f1f21;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    text-align: center;
    color: var(--text);
    font-family: inherit;
  }
  .char-card:hover { border-color: #555; }
  .char-card.locked { opacity: 0.45; cursor: pointer; }
  .char-card.active { border-color: var(--lcd-glow); box-shadow: 0 0 12px rgba(194,227,106,0.2); }
  .char-card .name {
    font-size: 10px;
    letter-spacing: 0.2em;
    margin-top: 6px;
  }
  .char-card .lock-icon {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 12px;
    color: #555;
  }
  .char-card.unlocked .lock-icon { color: var(--lcd-glow); }
  .char-card .preview {
    width: 60px;
    height: 60px;
    margin: 0 auto;
    background: var(--lcd-bg);
    border: 1px solid var(--lcd-bg-dark);
    border-radius: 4px;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .char-card .preview canvas {
    width: 80%;
    height: 80%;
    image-rendering: pixelated;
  }
  .roster .close {
    margin-top: 14px;
    width: 100%;
    background: transparent;
    border: 1px solid #2a2a2c;
    color: var(--text);
    padding: 10px;
    font-family: inherit;
    letter-spacing: 0.25em;
    font-size: 10px;
    cursor: pointer;
    border-radius: 6px;
  }
  .roster .close:hover { border-color: var(--lcd-glow); }

  .footer-note {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(200,200,192,0.25);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="device">
    <div class="strap"></div>
    <div class="speaker"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="brand">MONSTERTAMA</div>

    <div class="screen-frame">
      <div class="screen">
        <div class="lcd-text top" id="lcdTop">— SELECT —</div>
        <canvas id="spriteCanvas" width="512" height="512"></canvas>
        <div class="lcd-text bottom" id="lcdBottom">PRESS A</div>

        <!-- Code entry overlay -->
        <div class="code-pad" id="codePad" style="display:none;">
          <div class="label">ENTER CODE</div>
          <div class="digits">
            <span class="digit" id="d0">_</span>
            <span class="digit" id="d1">_</span>
            <span class="digit" id="d2">_</span>
            <span class="digit" id="d3">_</span>
          </div>
          <div class="hint" id="codeHint">TYPE CODE</div>
          <input
            id="codeInput"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="4"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Code eingeben"
          />
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="btn-wrap">
        <button class="btn" id="btnA" aria-label="A / Select">
          <svg class="glyph" viewBox="0 0 24 24"><path d="M3 12l7-7v4h11v6H10v4z" transform="rotate(180 12 12)"/></svg>
        </button>
        <span class="btn-label">A</span>
      </div>
      <div class="btn-wrap">
        <button class="btn" id="btnB" aria-label="B / Confirm">
          <svg class="glyph" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>
        </button>
        <span class="btn-label">B</span>
      </div>
      <div class="btn-wrap">
        <button class="btn" id="btnC" aria-label="C / Menu">
          <svg class="glyph" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2"/><rect x="3" y="11" width="18" height="2"/><rect x="3" y="17" width="18" height="2"/></svg>
        </button>
        <span class="btn-label">MENU</span>
      </div>
    </div>
  </div>
</div>

<!-- Charakter Roster -->
<div class="roster" id="roster">
  <div class="roster-inner">
    <h2>— ROSTER —</h2>
    <div class="roster-grid" id="rosterGrid"></div>
    <button class="close" id="closeRoster">CLOSE</button>
  </div>
</div>

<div class="footer-note">CORPSE MOUTH // MONSTERTAMA v0.1</div>

<script>
/* =========================================================
   CHARACTERS
   --------------------------------------------------------
   - Frames sind nur in geraden Schritten (0000, 0002, ... 0010)
   - squish hat einen Tippfehler im Repo: 00010 statt 0010
   - Codes: testweise alle 1234 (pro Charakter änderbar)

   Host-Strategie:
   - Wenn HTML auf birdbrain1991.github.io läuft → relative pfade
     (same-origin, keine CORS-issues)
   - Sonst → GitHub Pages URLs absolut (CORS-tauglich)
   - Fallback: raw.githubusercontent.com
   ========================================================= */
const GH_PAGES_BASE = 'https://birdbrain1991.github.io/monstertama/';
const RAW_BASE      = 'https://raw.githubusercontent.com/birdbrain1991/monstertama/main/';

// wenn wir auf der github pages domain laufen, einfach relative paths nehmen
const ON_GH_PAGES = location.hostname === 'birdbrain1991.github.io';
const REPO_BASE_PRIMARY  = ON_GH_PAGES ? '' : GH_PAGES_BASE;
const REPO_BASE_FALLBACK = RAW_BASE;

const CHARACTERS = [
  {
    id: 'bake_bake',
    label: 'BAKE BAKE',
    code: '1234',
    scale: 1.4,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'bake_bake' + f + '.png')
  },
  {
    id: 'iron_beak',
    label: 'IRON BEAK',
    code: '1234',
    scale: 1.4,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'iron_beak' + f + '.png')
  },
  {
    id: 'poke_poke',
    label: 'POKE POKE',
    code: '1234',
    scale: 1.0,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'poke_poke' + f + '.png')
  },
  {
    id: 'squish',
    label: 'SQUISH',
    code: '1234',
    scale: 1.0,
    // achtung: letzter frame im repo ist 00010 (tippfehler), nicht 0010
    frames: [
      'squish0000.png',
      'squish0002.png',
      'squish0004.png',
      'squish0006.png',
      'squish0008.png',
      'squish00010.png'
    ]
  }
];

/* =========================================================
   STATE
   ========================================================= */
const STORAGE_KEY = 'monstertama_unlocked_v1';
let unlocked = new Set(loadUnlocked());
let currentCharIdx = 0;
let processedFrames = {}; // id -> [Image, ...]  (mit weiß-zu-transparent)
let animTimer = null;
let frameIdx = 0;

/* =========================================================
   STORAGE
   ========================================================= */
function loadUnlocked() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}
function saveUnlocked() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...unlocked]));
  } catch(e) {}
}

/* =========================================================
   WHITE → TRANSPARENT VIA CANVAS
   --------------------------------------------------------
   Lädt PNG, ersetzt jedes "weißliche" Pixel mit transparent.
   Pixel die schwarz/dunkel sind bleiben → werden zu LCD-Ink.

   Loader probiert beide hosts (jsDelivr, dann raw github)
   und cached den funktionierenden host für die session.
   ========================================================= */
let workingHost = null; // wird auf den ersten erfolgreichen host gesetzt

function loadImageFromHost(host, filename) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    // bei same-origin kein crossOrigin nötig; bei cross-origin schon
    if (host !== '') img.crossOrigin = 'anonymous';
    let done = false;
    const timer = setTimeout(() => {
      if (done) return;
      done = true;
      reject(new Error('timeout: ' + host + filename));
    }, 8000);
    img.onload = () => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      resolve(img);
    };
    img.onerror = () => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      reject(new Error('host failed: ' + host + filename));
    };
    img.src = host + filename;
  });
}

async function loadImage(filename) {
  // wenn wir schon einen funktionierenden host kennen, den nehmen
  if (workingHost !== null) {
    try {
      return await loadImageFromHost(workingHost, filename);
    } catch(e) {
      workingHost = null;
    }
  }
  // primary host probieren (relative oder github pages)
  try {
    const img = await loadImageFromHost(REPO_BASE_PRIMARY, filename);
    workingHost = REPO_BASE_PRIMARY;
    return img;
  } catch(e1) {
    console.warn('primary host fehlgeschlagen, probiere raw github...', e1.message);
    try {
      const img = await loadImageFromHost(REPO_BASE_FALLBACK, filename);
      workingHost = REPO_BASE_FALLBACK;
      return img;
    } catch(e2) {
      throw new Error('Beide hosts fehlgeschlagen für ' + filename);
    }
  }
}

function processImage(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, c.width, c.height);
  const px = data.data;
  // LCD ink farbe (sehr dunkles olive/grünschwarz)
  const inkR = 0x0d, inkG = 0x16, inkB = 0x06;
  // dual threshold: alles über lightThreshold = transparent (weiß),
  // alles unter darkThreshold = voll opak (schwarze outlines),
  // dazwischen = anti-alias kante mit linearem alpha
  const lightThreshold = 220; // weißliche pixel → transparent
  const darkThreshold  = 100; // dunkle pixel → voll opak
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i+1], b = px[i+2];
    const avg = (r + g + b) / 3;
    if (avg >= lightThreshold) {
      // weiß / hellgrau → transparent
      px[i+3] = 0;
    } else if (avg <= darkThreshold) {
      // schwarz / dunkelgrau → voll opak in LCD-ink farbe
      px[i]   = inkR;
      px[i+1] = inkG;
      px[i+2] = inkB;
      px[i+3] = 255;
    } else {
      // dazwischen: kantenpixel mit linear alpha für sauberes anti-aliasing
      const t = (lightThreshold - avg) / (lightThreshold - darkThreshold);
      px[i]   = inkR;
      px[i+1] = inkG;
      px[i+2] = inkB;
      px[i+3] = Math.round(t * 255);
    }
  }
  ctx.putImageData(data, 0, 0);
  return c;
}

async function loadAndProcess(filename) {
  const img = await loadImage(filename);
  return processImage(img);
}

async function preloadCharacter(char) {
  if (processedFrames[char.id]) return processedFrames[char.id];
  setLcd('LOADING...', char.label);
  try {
    const frames = await Promise.all(char.frames.map(loadAndProcess));
    processedFrames[char.id] = frames;
    return frames;
  } catch(err) {
    console.error(err);
    setLcd('ERROR', char.label);
    return null;
  }
}

/* =========================================================
   ANIMATION
   ========================================================= */
const canvas = document.getElementById('spriteCanvas');
const cctx = canvas.getContext('2d');
cctx.imageSmoothingEnabled = false;

function clearCanvas() {
  cctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawFrame(img) {
  clearCanvas();
  if (!img) return;
  // contain-fit
  const cw = canvas.width, ch = canvas.height;
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;
  const scale = Math.min(cw / iw, ch / ih) * 0.95;
  const w = iw * scale;
  const h = ih * scale;
  const x = (cw - w) / 2;
  const y = (ch - h) / 2;
  cctx.drawImage(img, x, y, w, h);
}

function stopAnim() {
  if (animTimer) {
    clearInterval(animTimer);
    animTimer = null;
  }
  canvas.classList.remove('animated');
}

function startAnim(frames) {
  stopAnim();
  if (!frames || !frames.length) return;
  frameIdx = 0;
  drawFrame(frames[0]);
  canvas.classList.add('animated');
  // langsame abspielgeschwindigkeit, ca. 2.5 fps
  animTimer = setInterval(() => {
    frameIdx = (frameIdx + 1) % frames.length;
    drawFrame(frames[frameIdx]);
  }, 400);
}

/* =========================================================
   LCD TEXT
   ========================================================= */
function setLcd(top, bottom) {
  document.getElementById('lcdTop').textContent = top || '';
  document.getElementById('lcdBottom').textContent = bottom || '';
}

/* =========================================================
   CHARACTER DISPLAY
   ========================================================= */
async function showCharacter(idx) {
  currentCharIdx = idx;
  const char = CHARACTERS[idx];
  // charakter-spezifischen scale anwenden
  canvas.style.setProperty('--char-scale', char.scale || 1);
  if (!unlocked.has(char.id)) {
    stopAnim();
    clearCanvas();
    setLcd('LOCKED', char.label);
    openCodePad();
    return;
  }
  hideCodePad();
  setLcd(char.label, '');
  const frames = await preloadCharacter(char);
  if (frames) {
    setLcd(char.label, 'OK');
    startAnim(frames);
  }
}

function nextCharacter() {
  const next = (currentCharIdx + 1) % CHARACTERS.length;
  showCharacter(next);
}

/* =========================================================
   CODE PAD (auf LCD)
   --------------------------------------------------------
   - Code wird per Tastatur eingegeben (Laptop) oder
     virtueller Nummern-Tastatur (Tablet/Mobile)
   - Enter / 4. Ziffer → automatisch bestätigen
   - Backspace löscht
   - Button A/B funktionieren als Fallback
   ========================================================= */
const codePad = document.getElementById('codePad');
const codeInput = document.getElementById('codeInput');
const codeDigits = [
  document.getElementById('d0'),
  document.getElementById('d1'),
  document.getElementById('d2'),
  document.getElementById('d3'),
];
const codeHint = document.getElementById('codeHint');
let codeActive = false;

function openCodePad() {
  codeActive = true;
  codeInput.value = '';
  renderCodePad();
  codeHint.textContent = 'TYPE CODE';
  codePad.style.display = 'flex';
  codePad.classList.remove('error');
  // focus mit kleinem delay → triggert virtual keyboard auf mobile
  setTimeout(() => {
    codeInput.focus();
    codeInput.click();
  }, 50);
}
function hideCodePad() {
  codeActive = false;
  codeInput.blur();
  codeInput.value = '';
  codePad.style.display = 'none';
}
function renderCodePad() {
  const val = codeInput.value;
  const cursor = val.length;
  codeDigits.forEach((el, i) => {
    el.classList.remove('cursor');
    if (i < val.length) {
      el.textContent = val[i];
      el.style.opacity = '1';
    } else if (i === cursor) {
      el.textContent = '_';
      el.style.opacity = '1';
      el.classList.add('cursor');
    } else {
      el.textContent = '_';
      el.style.opacity = '0.4';
    }
  });
}

// nur ziffern, max 4
codeInput.addEventListener('input', (e) => {
  const clean = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
  if (e.target.value !== clean) e.target.value = clean;
  renderCodePad();
  if (clean.length === 4) {
    // kleine pause damit user die letzte ziffer sieht
    setTimeout(codeConfirm, 150);
  }
});

// Enter bestätigt manuell
codeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (codeInput.value.length === 4) codeConfirm();
  } else if (e.key === 'Escape') {
    hideCodePad();
    openRoster();
  }
});

// tap auf code-pad → re-focus (falls mobile keyboard zugeklappt wurde)
codePad.addEventListener('click', () => {
  if (codeActive) codeInput.focus();
});

function codeConfirm() {
  const entered = codeInput.value;
  if (entered.length !== 4) return;
  const char = CHARACTERS[currentCharIdx];
  if (entered === char.code) {
    unlocked.add(char.id);
    saveUnlocked();
    hideCodePad();
    setLcd('UNLOCKED!', char.label);
    setTimeout(() => showCharacter(currentCharIdx), 800);
  } else {
    codePad.classList.add('error');
    codeHint.textContent = 'WRONG!';
    setTimeout(() => {
      codeInput.value = '';
      codePad.classList.remove('error');
      codeHint.textContent = 'TYPE CODE';
      renderCodePad();
      codeInput.focus();
    }, 900);
  }
}

/* =========================================================
   ROSTER (menu)
   ========================================================= */
const roster = document.getElementById('roster');
const rosterGrid = document.getElementById('rosterGrid');
document.getElementById('closeRoster').addEventListener('click', () => {
  roster.classList.remove('open');
});

async function buildRoster() {
  rosterGrid.innerHTML = '';
  for (let i = 0; i < CHARACTERS.length; i++) {
    const char = CHARACTERS[i];
    const card = document.createElement('button');
    card.className = 'char-card';
    if (unlocked.has(char.id)) card.classList.add('unlocked');
    else card.classList.add('locked');
    if (i === currentCharIdx) card.classList.add('active');

    card.innerHTML = `
      <span class="lock-icon">${unlocked.has(char.id) ? '✓' : '🔒'}</span>
      <div class="preview"><canvas width="48" height="48"></canvas></div>
      <div class="name">${char.label}</div>
    `;
    card.addEventListener('click', () => {
      roster.classList.remove('open');
      showCharacter(i);
    });
    rosterGrid.appendChild(card);

    // preview: erstes frame (nur falls unlocked)
    if (unlocked.has(char.id)) {
      const pcv = card.querySelector('canvas');
      const pctx = pcv.getContext('2d');
      pctx.imageSmoothingEnabled = false;
      try {
        const frames = await preloadCharacter(char);
        if (frames && frames[0]) {
          const img = frames[0];
          const iw = img.naturalWidth || img.width;
          const ih = img.naturalHeight || img.height;
          const scale = Math.min(48/iw, 48/ih) * 0.9;
          const w = iw*scale, h = ih*scale;
          pctx.drawImage(img, (48-w)/2, (48-h)/2, w, h);
        }
      } catch(e) {}
    }
  }
}

function openRoster() {
  buildRoster();
  roster.classList.add('open');
}

/* =========================================================
   BUTTON HANDLERS
   ========================================================= */
document.getElementById('btnA').addEventListener('click', () => {
  if (codeActive) {
    // re-focus für mobile keyboard
    codeInput.focus();
  } else {
    nextCharacter();
  }
});

document.getElementById('btnB').addEventListener('click', () => {
  if (codeActive) {
    // manuell bestätigen falls weniger als 4 ziffern, oder re-focus
    if (codeInput.value.length === 4) {
      codeConfirm();
    } else {
      codeInput.focus();
    }
  } else {
    // refresh charakter
    showCharacter(currentCharIdx);
  }
});

document.getElementById('btnC').addEventListener('click', () => {
  if (codeActive) {
    hideCodePad();
    setLcd(CHARACTERS[currentCharIdx].label, 'LOCKED');
  }
  openRoster();
});

// keyboard shortcuts (nur wenn code-pad NICHT offen ist, damit
// die zifferneingabe nicht von hotkeys gestört wird)
document.addEventListener('keydown', (e) => {
  if (codeActive) return; // input field handelt eigene events
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowRight') {
    document.getElementById('btnA').click();
  } else if (e.key === 'b' || e.key === 'B' || e.key === 'Enter') {
    document.getElementById('btnB').click();
  } else if (e.key === 'm' || e.key === 'M' || e.key === 'Escape') {
    document.getElementById('btnC').click();
  }
});

/* =========================================================
   BOOT
   ========================================================= */
(async function init() {
  setLcd('MONSTERTAMA', 'BOOTING...');
  // kleine boot delay für stimmung
  await new Promise(r => setTimeout(r, 600));
  showCharacter(0);
})();
</script>
