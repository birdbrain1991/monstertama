<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MONSTERTAMA</title>
<style>
  :root {
    --shell:        #2a2a2c;
    --shell-light:  #3a3a3d;
    --shell-dark:   #18181a;
    --shell-rim:    #0d0d0e;
    --bezel:        #0a0a0b;
    --lcd-bg:       #6e8a32;
    --lcd-bg-dark:  #4f6b1c;
    --lcd-ink:      #0d1606;
    --lcd-glow:     #c2e36a;
    --btn:          #1f1f21;
    --btn-shine:    #4a4a4e;
    --accent:       #b03030;
    --text:         #c8c8c0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background:
      radial-gradient(ellipse at center, #1a1a1c 0%, #050506 80%),
      #000;
    color: var(--text);
    font-family: 'Courier New', ui-monospace, monospace;
    overflow-x: hidden;
    -webkit-font-smoothing: none;
    font-smooth: never;
  }

  /* film grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 16px;
  }

  /* ------------ TAMAGOTCHI DEVICE ------------ */
  .device {
    position: relative;
    width: 360px;
    aspect-ratio: 360 / 460;
    background:
      radial-gradient(ellipse at 30% 20%, var(--shell-light), var(--shell) 45%, var(--shell-dark) 100%);
    border-radius: 50% 50% 45% 45% / 38% 38% 50% 50%;
    box-shadow:
      inset 0 -14px 30px rgba(0,0,0,0.6),
      inset 0 8px 14px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.7),
      0 0 0 4px var(--shell-rim);
    padding: 64px 40px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .device::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.015) 0 1px,
        transparent 1px 4px
      );
    pointer-events: none;
  }

  .speaker {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
  }
  .speaker span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--shell-dark);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
  }

  .brand {
    position: absolute;
    top: 44px;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(200,200,192,0.35);
    font-weight: bold;
  }

  /* ------------ SIDE BUTTONS ------------ */
  .side-btn {
    position: absolute;
    width: 18px;
    height: 38px;
    border: none;
    cursor: pointer;
    background:
      linear-gradient(180deg, var(--shell-light), var(--shell-dark));
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.15),
      inset 0 -2px 3px rgba(0,0,0,0.5),
      0 0 0 1px rgba(0,0,0,0.5);
    z-index: 5;
    color: var(--text);
    font-family: inherit;
    font-size: 7px;
    font-weight: bold;
    letter-spacing: 0.1em;
    padding: 0;
    transition: transform 0.08s ease;
  }
  .side-btn:active { transform: scale(0.96); }
  .side-btn.left {
    left: -4px;
    top: 38%;
    border-radius: 4px 0 0 4px;
  }
  .side-btn.right {
    right: -4px;
    top: 38%;
    border-radius: 0 4px 4px 0;
  }
  /* tiny LED indicator next to side buttons (inside shell) */
  .side-led {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 4px rgba(176,48,48,0.6);
    z-index: 4;
    top: calc(38% + 17px);
  }
  .side-led.left  { left: 22px; }
  .side-led.right { right: 22px; }
  .side-btn-label {
    position: absolute;
    top: calc(38% + 42px);
    font-size: 6px;
    letter-spacing: 0.2em;
    color: rgba(200,200,192,0.35);
    pointer-events: none;
    z-index: 4;
    text-align: center;
    width: 40px;
  }
  .side-btn-label.left  { left: -6px; }
  .side-btn-label.right { right: -6px; }

  /* ------------ LCD SCREEN ------------ */
  .screen-frame {
    width: 100%;
    aspect-ratio: 1.15 / 1;
    background: var(--bezel);
    border-radius: 18px;
    padding: 14px;
    box-shadow:
      inset 0 4px 10px rgba(0,0,0,0.9),
      inset 0 -2px 4px rgba(255,255,255,0.04),
      0 2px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  .screen {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 30% 25%, var(--lcd-bg) 0%, var(--lcd-bg-dark) 75%, #3a4f10 100%);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 30px rgba(0,0,0,0.35),
      inset 0 0 60px rgba(0,0,0,0.2);
  }

  /* scanlines */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0 1px,
        transparent 1px 3px
      );
    pointer-events: none;
    z-index: 3;
  }

  /* LCD pixel grid */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 4px 4px;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    96% { opacity: 1; }
    97% { opacity: 0.92; }
    98% { opacity: 1; }
  }
  .screen { animation: flicker 7s infinite; }

  /* ------------ SCREEN MODES ------------ */
  .lcd-screen {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: none;
    color: var(--lcd-ink);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    padding: 14px;
  }
  .lcd-screen.active { display: flex; flex-direction: column; }

  /* MAIN screen (sprite display) */
  #screenMain { align-items: center; justify-content: center; padding: 0; }
  #spriteCanvas {
    --char-scale: 1;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--char-scale));
    width: 81%;
    height: 81%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    filter: drop-shadow(0 0 1px rgba(13,22,6,0.4));
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, -50%) scale(var(--char-scale)); }
    50%      { transform: translate(-50%, calc(-50% - 6px)) scale(var(--char-scale)); }
  }
  #spriteCanvas.animated { animation: bob 2.4s ease-in-out infinite; }

  .lcd-name-top {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.2em;
  }
  .lcd-status-bottom {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.15em;
    opacity: 0.8;
  }

  /* MENU screens (lists) */
  .lcd-title {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.3em;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--lcd-ink);
    padding-bottom: 6px;
  }
  .lcd-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 0 8px;
  }
  .lcd-list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
  }
  .lcd-list-item .arrow {
    width: 12px;
    display: inline-block;
    visibility: hidden;
  }
  .lcd-list-item.active .arrow {
    visibility: visible;
  }
  .lcd-list-item.active {
    background: var(--lcd-ink);
    color: var(--lcd-bg);
    padding: 2px 4px;
    margin: 0 -4px;
  }

  .lcd-hint {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 7px;
    letter-spacing: 0.2em;
    opacity: 0.55;
  }

  /* CHARS screen */
  #screenChars { padding: 0; }
  #charsCanvas {
    --char-scale: 1;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--char-scale));
    width: 70%;
    height: 70%;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 1px rgba(13,22,6,0.4));
  }
  #charsCanvas.animated { animation: bob 2.4s ease-in-out infinite; }
  .chars-locked-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: var(--lcd-ink);
    line-height: 1;
  }
  .chars-name {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chars-name .nav-arrow {
    font-size: 10px;
    opacity: 0.6;
  }
  .chars-status {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.2em;
  }

  /* STATS screen */
  #screenStats { padding: 14px; }
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 3px 0;
  }
  .stat-row .stat-name {
    flex: 0 0 auto;
  }
  .stat-row .stat-pips {
    flex: 0 0 auto;
    display: flex;
    gap: 3px;
    font-size: 11px;
    letter-spacing: 0;
  }
  .pip {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1.5px solid var(--lcd-ink);
  }
  .pip.filled {
    background: var(--lcd-ink);
  }

  /* CODE screen */
  #screenCode { align-items: center; justify-content: center; gap: 10px; padding: 14px; }
  .code-label {
    font-size: 10px;
    letter-spacing: 0.25em;
  }
  .code-char {
    font-size: 9px;
    letter-spacing: 0.2em;
    opacity: 0.7;
  }
  .code-digits {
    display: flex;
    gap: 8px;
    font-size: 22px;
    letter-spacing: 0.15em;
  }
  .code-digit {
    width: 22px;
    text-align: center;
    border-bottom: 2px solid var(--lcd-ink);
    padding-bottom: 2px;
  }
  @keyframes blink {
    0%, 50%   { opacity: 1; }
    51%, 100% { opacity: 0.3; }
  }
  .code-digit.cursor { animation: blink 1s infinite; }
  .code-hint {
    font-size: 8px;
    letter-spacing: 0.15em;
    opacity: 0.7;
  }
  #screenCode.error .code-digits { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
  #codeInput {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* FIGHT screen */
  #screenFight { align-items: center; justify-content: center; gap: 12px; }
  .fight-title {
    font-size: 18px;
    letter-spacing: 0.4em;
  }
  .fight-sub {
    font-size: 9px;
    letter-spacing: 0.25em;
    opacity: 0.7;
  }

  /* ------------ FRONT BUTTONS ------------ */
  .controls {
    margin-top: 28px;
    display: flex;
    gap: 26px;
    align-items: center;
    justify-content: center;
  }
  .btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background:
      radial-gradient(circle at 35% 30%, var(--btn-shine), var(--btn) 65%, #000 100%);
    box-shadow:
      inset 0 -3px 5px rgba(0,0,0,0.6),
      inset 0 2px 3px rgba(255,255,255,0.15),
      0 3px 6px rgba(0,0,0,0.5),
      0 0 0 2px rgba(0,0,0,0.4);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    display: grid;
    place-items: center;
  }
  .btn:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 -1px 2px rgba(0,0,0,0.6),
      inset 0 2px 4px rgba(0,0,0,0.4),
      0 1px 2px rgba(0,0,0,0.5),
      0 0 0 2px rgba(0,0,0,0.4);
  }
  .btn .glyph {
    width: 16px;
    height: 16px;
    fill: var(--text);
  }
  .btn-label {
    position: absolute;
    margin-top: 56px;
    font-size: 7px;
    letter-spacing: 0.2em;
    color: rgba(200,200,192,0.4);
    pointer-events: none;
  }
  .btn-wrap {
    position: relative;
    display: grid;
    place-items: center;
  }

  /* ------------ STRAP HOLE ------------ */
  .strap {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 14px;
    background: var(--shell-rim);
    border-radius: 0 0 12px 12px;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.6);
  }
  .strap::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 4px;
    background: #000;
    border-radius: 4px;
  }

  .footer-note {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(200,200,192,0.25);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="device">
    <div class="strap"></div>
    <div class="speaker"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="brand">MONSTERTAMA</div>

    <!-- SIDE BUTTONS -->
    <button class="side-btn left"  id="btnBack"   aria-label="Back">B</button>
    <button class="side-btn right" id="btnAccept" aria-label="Accept">A</button>
    <div class="side-led left"></div>
    <div class="side-led right"></div>
    <div class="side-btn-label left">BACK</div>
    <div class="side-btn-label right">OK</div>

    <div class="screen-frame">
      <div class="screen">

        <!-- MAIN: sprite display -->
        <div class="lcd-screen active" id="screenMain">
          <div class="lcd-name-top" id="mainName">—</div>
          <canvas id="spriteCanvas" width="512" height="512"></canvas>
          <div class="lcd-status-bottom" id="mainStatus"></div>
        </div>

        <!-- MENU: main menu list -->
        <div class="lcd-screen" id="screenMenu">
          <div class="lcd-title">— MENU —</div>
          <div class="lcd-list" id="menuList"></div>
          <div class="lcd-hint">↑↓ NAVIGATE  OK SELECT</div>
        </div>

        <!-- CHARS: character browser -->
        <div class="lcd-screen" id="screenChars">
          <div class="chars-name">
            <span class="nav-arrow">&lt;</span>
            <span id="charsName">—</span>
            <span class="nav-arrow">&gt;</span>
          </div>
          <canvas id="charsCanvas" width="512" height="512"></canvas>
          <div class="chars-locked-icon" id="charsLockIcon" style="display:none;">🔒</div>
          <div class="chars-status" id="charsStatus">—</div>
          <div class="lcd-hint">↑↓ BROWSE  OK SELECT</div>
        </div>

        <!-- STATS -->
        <div class="lcd-screen" id="screenStats">
          <div class="lcd-title" id="statsTitle">—</div>
          <div id="statsList"></div>
          <div class="lcd-hint">BACK TO RETURN</div>
        </div>

        <!-- CARE -->
        <div class="lcd-screen" id="screenCare">
          <div class="lcd-title">— CARE —</div>
          <div class="lcd-list" id="careList"></div>
          <div class="lcd-hint">↑↓ NAVIGATE  OK SELECT</div>
        </div>

        <!-- FIGHT -->
        <div class="lcd-screen" id="screenFight">
          <div class="fight-title">FIGHT</div>
          <div class="fight-sub">NOT READY</div>
          <div class="lcd-hint">BACK TO RETURN</div>
        </div>

        <!-- CODE entry -->
        <div class="lcd-screen" id="screenCode">
          <div class="code-label">ENTER CODE</div>
          <div class="code-char" id="codeCharName">—</div>
          <div class="code-digits">
            <span class="code-digit" id="d0">_</span>
            <span class="code-digit" id="d1">_</span>
            <span class="code-digit" id="d2">_</span>
            <span class="code-digit" id="d3">_</span>
          </div>
          <div class="code-hint" id="codeHint">TYPE CODE</div>
          <input
            id="codeInput"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="4"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Code eingeben"
          />
        </div>

      </div>
    </div>

    <!-- FRONT BUTTONS: MENU | UP | DOWN -->
    <div class="controls">
      <div class="btn-wrap">
        <button class="btn" id="btnMenu" aria-label="Menu">
          <svg class="glyph" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2"/><rect x="3" y="11" width="18" height="2"/><rect x="3" y="17" width="18" height="2"/></svg>
        </button>
        <span class="btn-label">MENU</span>
      </div>
      <div class="btn-wrap">
        <button class="btn" id="btnUp" aria-label="Up">
          <svg class="glyph" viewBox="0 0 24 24"><path d="M12 4l8 10h-5v6h-6v-6H4z"/></svg>
        </button>
        <span class="btn-label">UP</span>
      </div>
      <div class="btn-wrap">
        <button class="btn" id="btnDown" aria-label="Down">
          <svg class="glyph" viewBox="0 0 24 24"><path d="M12 20l-8-10h5V4h6v6h5z"/></svg>
        </button>
        <span class="btn-label">DOWN</span>
      </div>
    </div>
  </div>
</div>

<div class="footer-note">CORPSE MOUTH // MONSTERTAMA v0.2</div>

<script>
/* =========================================================
   CHARACTERS
   ========================================================= */
const GH_PAGES_BASE = 'https://birdbrain1991.github.io/monstertama/';
const RAW_BASE      = 'https://raw.githubusercontent.com/birdbrain1991/monstertama/main/';
const ON_GH_PAGES = location.hostname === 'birdbrain1991.github.io';
const REPO_BASE_PRIMARY  = ON_GH_PAGES ? '' : GH_PAGES_BASE;
const REPO_BASE_FALLBACK = RAW_BASE;

const CHARACTERS = [
  {
    id: 'bake_bake', label: 'BAKE BAKE', code: '1234', scale: 2.1,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'bake_bake' + f + '.png')
  },
  {
    id: 'iron_beak', label: 'IRON BEAK', code: '1234', scale: 2.1,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'iron_beak' + f + '.png')
  },
  {
    id: 'poke_poke', label: 'POKE POKE', code: '1234', scale: 1.0,
    frames: ['0000','0002','0004','0006','0008','0010'].map(f => 'poke_poke' + f + '.png')
  },
  {
    id: 'squish', label: 'SQUISH', code: '1234', scale: 1.5,
    frames: [
      'squish0000.png','squish0002.png','squish0004.png',
      'squish0006.png','squish0008.png','squish00010.png'
    ]
  }
];

const MENU_ITEMS = [
  { id: 'chars', label: '1 CHARS' },
  { id: 'stats', label: '2 STATS' },
  { id: 'care',  label: '3 CARE' },
  { id: 'fight', label: '4 FIGHT' },
];

const CARE_ITEMS = [
  { id: 'pet',   label: 'PET' },
  { id: 'feed',  label: 'FEED' },
  { id: 'treat', label: 'TREAT' },
  { id: 'clean', label: 'CLEAN' },
  { id: 'sleep', label: 'SLEEP' },
];

// stats - placeholder, später dynamisch per charakter
const STAT_NAMES = ['???', '???', '???', '???', '???'];
const STAT_TOTAL_PIPS = 5;

/* =========================================================
   STATE
   ========================================================= */
const STORAGE_KEY = 'monstertama_unlocked_v1';
let unlocked = new Set(loadUnlocked());

let mode = 'main'; // main | menu | chars | stats | care | fight | code
let activeCharIdx = 0;   // der momentan "aktive" charakter (im main screen sichtbar)
let browseCharIdx = 0;   // index beim browsen im CHARS screen
let menuIdx = 0;
let careIdx = 0;

let processedFrames = {}; // id -> [canvas, ...]
let animTimer = null;
let frameIdx = 0;
let activeAnimCanvas = null; // welcher canvas wird gerade animiert

/* =========================================================
   STORAGE
   ========================================================= */
function loadUnlocked() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}
function saveUnlocked() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...unlocked]));
  } catch(e) {}
}

/* =========================================================
   IMAGE LOADING + PROCESSING (weiß → transparent)
   ========================================================= */
let workingHost = null;

function loadImageFromHost(host, filename) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    if (host !== '') img.crossOrigin = 'anonymous';
    let done = false;
    const timer = setTimeout(() => {
      if (done) return; done = true;
      reject(new Error('timeout: ' + host + filename));
    }, 8000);
    img.onload = () => {
      if (done) return; done = true;
      clearTimeout(timer); resolve(img);
    };
    img.onerror = () => {
      if (done) return; done = true;
      clearTimeout(timer);
      reject(new Error('host failed: ' + host + filename));
    };
    img.src = host + filename;
  });
}

async function loadImage(filename) {
  if (workingHost !== null) {
    try { return await loadImageFromHost(workingHost, filename); }
    catch(e) { workingHost = null; }
  }
  try {
    const img = await loadImageFromHost(REPO_BASE_PRIMARY, filename);
    workingHost = REPO_BASE_PRIMARY;
    return img;
  } catch(e1) {
    console.warn('primary host fehlgeschlagen, probiere raw github...', e1.message);
    try {
      const img = await loadImageFromHost(REPO_BASE_FALLBACK, filename);
      workingHost = REPO_BASE_FALLBACK;
      return img;
    } catch(e2) {
      throw new Error('Beide hosts fehlgeschlagen für ' + filename);
    }
  }
}

function processImage(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, c.width, c.height);
  const px = data.data;
  const inkR = 0x0d, inkG = 0x16, inkB = 0x06;
  const lightThreshold = 220;
  const darkThreshold  = 100;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i+1], b = px[i+2];
    const avg = (r + g + b) / 3;
    if (avg >= lightThreshold) {
      px[i+3] = 0;
    } else if (avg <= darkThreshold) {
      px[i]=inkR; px[i+1]=inkG; px[i+2]=inkB; px[i+3]=255;
    } else {
      const t = (lightThreshold - avg) / (lightThreshold - darkThreshold);
      px[i]=inkR; px[i+1]=inkG; px[i+2]=inkB;
      px[i+3] = Math.round(t * 255);
    }
  }
  ctx.putImageData(data, 0, 0);
  return c;
}

async function loadAndProcess(filename) {
  const img = await loadImage(filename);
  return processImage(img);
}

async function preloadCharacter(char) {
  if (processedFrames[char.id]) return processedFrames[char.id];
  try {
    const frames = await Promise.all(char.frames.map(loadAndProcess));
    processedFrames[char.id] = frames;
    return frames;
  } catch(err) {
    console.error(err);
    return null;
  }
}

/* =========================================================
   ANIMATION
   ========================================================= */
function clearAnimCanvas() {
  if (!activeAnimCanvas) return;
  const ctx = activeAnimCanvas.getContext('2d');
  ctx.clearRect(0, 0, activeAnimCanvas.width, activeAnimCanvas.height);
}

function drawFrame(canvas, img) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!img) return;
  const cw = canvas.width, ch = canvas.height;
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;
  const scale = Math.min(cw / iw, ch / ih) * 0.95;
  const w = iw * scale;
  const h = ih * scale;
  const x = (cw - w) / 2;
  const y = (ch - h) / 2;
  ctx.drawImage(img, x, y, w, h);
}

function stopAnim() {
  if (animTimer) { clearInterval(animTimer); animTimer = null; }
  if (activeAnimCanvas) activeAnimCanvas.classList.remove('animated');
}

function startAnim(canvas, frames) {
  stopAnim();
  if (!frames || !frames.length) return;
  activeAnimCanvas = canvas;
  frameIdx = 0;
  drawFrame(canvas, frames[0]);
  canvas.classList.add('animated');
  animTimer = setInterval(() => {
    frameIdx = (frameIdx + 1) % frames.length;
    drawFrame(canvas, frames[frameIdx]);
  }, 400);
}

/* =========================================================
   SCREEN SWITCHING
   ========================================================= */
const screens = {
  main:  document.getElementById('screenMain'),
  menu:  document.getElementById('screenMenu'),
  chars: document.getElementById('screenChars'),
  stats: document.getElementById('screenStats'),
  care:  document.getElementById('screenCare'),
  fight: document.getElementById('screenFight'),
  code:  document.getElementById('screenCode'),
};

function setMode(newMode) {
  mode = newMode;
  Object.entries(screens).forEach(([key, el]) => {
    el.classList.toggle('active', key === newMode);
  });
  // pro mode: rendering aufrufen
  if (newMode === 'main')  renderMain();
  if (newMode === 'menu')  renderMenu();
  if (newMode === 'chars') renderChars();
  if (newMode === 'stats') renderStats();
  if (newMode === 'care')  renderCare();
  if (newMode === 'fight') renderFight();
  if (newMode === 'code')  renderCode();
}

/* =========================================================
   RENDER: MAIN
   ========================================================= */
const mainCanvas = document.getElementById('spriteCanvas');
const mainName   = document.getElementById('mainName');
const mainStatus = document.getElementById('mainStatus');

async function renderMain() {
  const char = CHARACTERS[activeCharIdx];
  mainName.textContent = char.label;
  mainStatus.textContent = '';
  mainCanvas.style.setProperty('--char-scale', char.scale || 1);
  if (!unlocked.has(char.id)) {
    stopAnim();
    const ctx = mainCanvas.getContext('2d');
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    mainStatus.textContent = '🔒 LOCKED';
    return;
  }
  mainStatus.textContent = 'OK';
  const frames = await preloadCharacter(char);
  if (frames) startAnim(mainCanvas, frames);
}

/* =========================================================
   RENDER: MENU
   ========================================================= */
const menuList = document.getElementById('menuList');

function renderMenu() {
  stopAnim();
  menuList.innerHTML = '';
  MENU_ITEMS.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'lcd-list-item' + (i === menuIdx ? ' active' : '');
    row.innerHTML = '<span class="arrow">►</span><span>' + item.label + '</span>';
    menuList.appendChild(row);
  });
}

/* =========================================================
   RENDER: CHARS
   ========================================================= */
const charsCanvas   = document.getElementById('charsCanvas');
const charsName     = document.getElementById('charsName');
const charsStatus   = document.getElementById('charsStatus');
const charsLockIcon = document.getElementById('charsLockIcon');

async function renderChars() {
  const char = CHARACTERS[browseCharIdx];
  charsName.textContent = char.label;
  charsCanvas.style.setProperty('--char-scale', char.scale || 1);
  if (unlocked.has(char.id)) {
    charsLockIcon.style.display = 'none';
    charsStatus.textContent = (browseCharIdx === activeCharIdx) ? 'ACTIVE' : 'OK / OK TO SET ACTIVE';
    const frames = await preloadCharacter(char);
    if (frames) startAnim(charsCanvas, frames);
  } else {
    stopAnim();
    const ctx = charsCanvas.getContext('2d');
    ctx.clearRect(0, 0, charsCanvas.width, charsCanvas.height);
    charsLockIcon.style.display = 'block';
    charsStatus.textContent = 'LOCKED / OK TO UNLOCK';
  }
}

/* =========================================================
   RENDER: STATS
   ========================================================= */
const statsTitle = document.getElementById('statsTitle');
const statsList  = document.getElementById('statsList');

function renderStats() {
  stopAnim();
  const char = CHARACTERS[activeCharIdx];
  statsTitle.textContent = char.label;
  statsList.innerHTML = '';
  // testweise: alle stats sind ???, mit ein paar gefüllten pips
  // (später kannst du echte werte pro charakter ergänzen)
  const placeholderValues = [3, 2, 4, 1, 3]; // beispielwerte
  STAT_NAMES.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    const filled = placeholderValues[i % placeholderValues.length] || 0;
    let pips = '';
    for (let p = 0; p < STAT_TOTAL_PIPS; p++) {
      pips += '<span class="pip ' + (p < filled ? 'filled' : '') + '"></span>';
    }
    row.innerHTML =
      '<span class="stat-name">' + name + '</span>' +
      '<span class="stat-pips">' + pips + '</span>';
    statsList.appendChild(row);
  });
}

/* =========================================================
   RENDER: CARE
   ========================================================= */
const careList = document.getElementById('careList');

function renderCare() {
  stopAnim();
  careList.innerHTML = '';
  CARE_ITEMS.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'lcd-list-item' + (i === careIdx ? ' active' : '');
    row.innerHTML = '<span class="arrow">►</span><span>' + item.label + '</span>';
    careList.appendChild(row);
  });
}

/* =========================================================
   RENDER: FIGHT
   ========================================================= */
function renderFight() {
  stopAnim();
  // nichts dynamisches für jetzt
}

/* =========================================================
   RENDER: CODE
   ========================================================= */
const codeScreen   = document.getElementById('screenCode');
const codeInput    = document.getElementById('codeInput');
const codeCharName = document.getElementById('codeCharName');
const codeDigits = [
  document.getElementById('d0'),
  document.getElementById('d1'),
  document.getElementById('d2'),
  document.getElementById('d3'),
];
const codeHint = document.getElementById('codeHint');

function renderCode() {
  stopAnim();
  codeScreen.classList.remove('error');
  codeCharName.textContent = CHARACTERS[browseCharIdx].label;
  codeInput.value = '';
  codeHint.textContent = 'TYPE 4-DIGIT CODE';
  renderCodeDigits();
  setTimeout(() => { codeInput.focus(); codeInput.click(); }, 50);
}

function renderCodeDigits() {
  const val = codeInput.value;
  const cursor = val.length;
  codeDigits.forEach((el, i) => {
    el.classList.remove('cursor');
    if (i < val.length) {
      el.textContent = val[i];
      el.style.opacity = '1';
    } else if (i === cursor) {
      el.textContent = '_';
      el.style.opacity = '1';
      el.classList.add('cursor');
    } else {
      el.textContent = '_';
      el.style.opacity = '0.4';
    }
  });
}

codeInput.addEventListener('input', (e) => {
  const clean = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
  if (e.target.value !== clean) e.target.value = clean;
  renderCodeDigits();
  if (clean.length === 4) setTimeout(codeConfirm, 150);
});

codeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (codeInput.value.length === 4) codeConfirm();
  }
});

codeScreen.addEventListener('click', () => {
  if (mode === 'code') codeInput.focus();
});

function codeConfirm() {
  const entered = codeInput.value;
  if (entered.length !== 4) return;
  const char = CHARACTERS[browseCharIdx];
  if (entered === char.code) {
    unlocked.add(char.id);
    saveUnlocked();
    codeHint.textContent = 'UNLOCKED!';
    setTimeout(() => setMode('chars'), 900);
  } else {
    codeScreen.classList.add('error');
    codeHint.textContent = 'WRONG!';
    setTimeout(() => {
      codeInput.value = '';
      codeScreen.classList.remove('error');
      codeHint.textContent = 'TYPE 4-DIGIT CODE';
      renderCodeDigits();
      codeInput.focus();
    }, 900);
  }
}

/* =========================================================
   BUTTON HANDLERS
   ---------------------------------------------------------
   BACK   - links seite - zurück / cancel
   OK     - rechts seite - bestätigen / select
   MENU   - front - öffnet menu (toggle main↔menu)
   UP     - front - navigation hoch
   DOWN   - front - navigation runter
   ========================================================= */

function onMenu() {
  if (mode === 'main') {
    menuIdx = 0;
    setMode('menu');
  } else if (mode === 'code') {
    // im code mode menu = abbrechen
    setMode('chars');
  } else {
    // aus jedem anderen mode zurück zum hauptmenü
    setMode('menu');
  }
}

function onBack() {
  if (mode === 'menu')       setMode('main');
  else if (mode === 'chars') setMode('menu');
  else if (mode === 'stats') setMode('menu');
  else if (mode === 'care')  setMode('menu');
  else if (mode === 'fight') setMode('menu');
  else if (mode === 'code')  setMode('chars');
  else if (mode === 'main')  { /* nothing */ }
}

function onAccept() {
  if (mode === 'menu') {
    const sel = MENU_ITEMS[menuIdx];
    if (sel.id === 'chars') {
      browseCharIdx = activeCharIdx;
      setMode('chars');
    } else if (sel.id === 'stats') setMode('stats');
    else if (sel.id === 'care')    { careIdx = 0; setMode('care'); }
    else if (sel.id === 'fight')   setMode('fight');
  } else if (mode === 'chars') {
    const char = CHARACTERS[browseCharIdx];
    if (unlocked.has(char.id)) {
      // als aktiven charakter setzen
      activeCharIdx = browseCharIdx;
      setMode('main');
    } else {
      // code eingabe
      setMode('code');
    }
  } else if (mode === 'care') {
    // platzhalter: aktion ausführen
    const sel = CARE_ITEMS[careIdx];
    flashHint(screens.care, 'CARE: ' + sel.label + ' (NOT WIRED)');
  } else if (mode === 'code') {
    if (codeInput.value.length === 4) codeConfirm();
    else codeInput.focus();
  }
}

function onUp() {
  if (mode === 'menu') {
    menuIdx = (menuIdx - 1 + MENU_ITEMS.length) % MENU_ITEMS.length;
    renderMenu();
  } else if (mode === 'chars') {
    browseCharIdx = (browseCharIdx - 1 + CHARACTERS.length) % CHARACTERS.length;
    renderChars();
  } else if (mode === 'care') {
    careIdx = (careIdx - 1 + CARE_ITEMS.length) % CARE_ITEMS.length;
    renderCare();
  }
}

function onDown() {
  if (mode === 'menu') {
    menuIdx = (menuIdx + 1) % MENU_ITEMS.length;
    renderMenu();
  } else if (mode === 'chars') {
    browseCharIdx = (browseCharIdx + 1) % CHARACTERS.length;
    renderChars();
  } else if (mode === 'care') {
    careIdx = (careIdx + 1) % CARE_ITEMS.length;
    renderCare();
  }
}

// kleiner hint flash für care actions (placeholder)
function flashHint(screenEl, text) {
  let hint = screenEl.querySelector('.lcd-hint');
  if (!hint) return;
  const original = hint.textContent;
  hint.textContent = text;
  hint.style.opacity = '1';
  setTimeout(() => {
    hint.textContent = original;
    hint.style.opacity = '';
  }, 1100);
}

document.getElementById('btnMenu').addEventListener('click',   onMenu);
document.getElementById('btnUp').addEventListener('click',     onUp);
document.getElementById('btnDown').addEventListener('click',   onDown);
document.getElementById('btnBack').addEventListener('click',   onBack);
document.getElementById('btnAccept').addEventListener('click', onAccept);

// keyboard shortcuts (außer wenn code-eingabe aktiv)
document.addEventListener('keydown', (e) => {
  if (mode === 'code') return; // input field handelt eigene events
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
    e.preventDefault(); onUp();
  } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
    e.preventDefault(); onDown();
  } else if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault(); onAccept();
  } else if (e.key === 'Escape' || e.key === 'Backspace' || e.key === 'ArrowLeft') {
    e.preventDefault(); onBack();
  } else if (e.key === 'm' || e.key === 'M') {
    e.preventDefault(); onMenu();
  }
});

/* =========================================================
   BOOT
   ========================================================= */
(async function init() {
  mainName.textContent = 'MONSTERTAMA';
  mainStatus.textContent = 'BOOTING...';
  await new Promise(r => setTimeout(r, 500));
  setMode('main');
})();
